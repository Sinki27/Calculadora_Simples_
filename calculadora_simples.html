<html>
    <head>
        <title>Calculadora</title>
		<link rel="stylesheet" type="text/css" href="css/style.css">
		<!-- Linkando o Css como html --> 
		<script src="/javaScript_2/js/calculdora.js" method="" defer></script>
		<!-- Linkando o JavaScript com o Html -->
		<link rel="icon" href="imagens/calculadora_simples.png" type="image/png ">
		<!-- Colocando imagem no titulo -->
    </head>
	<body>
        <div id="conteudo">
            <h1 id="titulo">
                CALCULADORA - SIMPLES
            </h1>
            <div id="form">
				<form name="frmCalculadora" method="get" action="">
					<label>Valor 1:</label> <input type="text" name="txtn1" value="" id="valor1" class="valor" placeholder="0" > <br>
					<label>Valor 2:</label> <input type="text" name="txtn2" value="" id="valor2" class="valor" placeholder="0" > <br>

					<div class="divOperacoes">
						<div name="btnSomar" 	id="somar" class="botao">+</div>
						<div name="btnSubtrair" id="subtrair" class="botao">-</div>
					</div>

					<div class="divOperacoes">
						<div name="btnMultiplicar" 	id="multiplicar" class="botao">*</div>
						<div name="btnDividir" 		id="dividir" class="botao">/</div>
					</div>
					<div class="divOperacoes">
						<div name="btnCE" id="ce" class="botao">CE</div>
						
					</div>
				</form>
            </div>
            <div id="resultado">
                0
            </div>
        </div>
	</body>
</html>
